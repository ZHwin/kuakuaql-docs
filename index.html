<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>夸夸签 · 自动签到脚本合集</title>
<meta name="description" content="130+ 自动签到与任务脚本合集，适用于青龙面板等自动化工具。" />
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎯</text></svg>" />
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  :root {
    --bg: #f6f8fa;
    --panel: #ffffff;
    --text: #1f2328;
    --muted: #656d76;
    --border: #d0d7de;
    --brand: #2f81f7;
    --brand-soft: #ddf4ff;
    --code-bg: #f6f8fa;
    --shadow: 0 1px 3px rgba(0,0,0,.08), 0 8px 24px rgba(0,0,0,.06);
    --timeline-dot: #2f81f7;
    --timeline-line: #d0d7de;
  }
  html[data-theme="dark"] {
    --bg: #0d1117;
    --panel: #161b22;
    --text: #e6edf3;
    --muted: #8b949e;
    --border: #30363d;
    --brand: #2f81f7;
    --brand-soft: #132a44;
    --code-bg: #161b22;
    --shadow: 0 1px 3px rgba(0,0,0,.4), 0 8px 24px rgba(0,0,0,.5);
    --timeline-line: #30363d;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
      "Hiragino Sans GB", "Microsoft YaHei", Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }
  a { color: var(--brand); text-decoration: none; }
  a:hover { text-decoration: underline; }

  /* 顶部横幅 */
  .hero {
    background: linear-gradient(135deg, #2f81f7 0%, #7c3aed 100%);
    color: #fff;
    padding: 48px 20px 56px;
    text-align: center;
  }
  .hero h1 { margin: 0 0 10px; font-size: 2.2rem; letter-spacing: 1px; }
  .hero p { margin: 0 auto; max-width: 600px; opacity: .95; font-size: 1rem; }
  .hero .badges { margin-top: 16px; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
  .hero .badge {
    background: rgba(255,255,255,.18);
    border: 1px solid rgba(255,255,255,.35);
    padding: 5px 13px; border-radius: 999px; font-size: .82rem; backdrop-filter: blur(4px);
  }

  /* 主布局：左时间轴 + 右内容 */
  .wrap {
    max-width: 1200px; margin: -28px auto 60px; padding: 0 20px;
    display: flex; gap: 22px; align-items: flex-start;
  }

  /* 左侧时间轴 */
  .sidebar {
    width: 300px; flex-shrink: 0;
    position: sticky; top: 12px;
  }
  .sidebar-panel {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 14px; box-shadow: var(--shadow); overflow: hidden;
  }
  .sidebar-header {
    padding: 14px 18px; font-weight: 700; font-size: .95rem;
    border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px;
  }
  .sidebar-body { padding: 10px 14px 16px; max-height: calc(100vh - 160px); overflow-y: auto; }

  /* 时间轴样式 */
  .timeline { position: relative; padding-left: 26px; }
  .timeline::before {
    content: ''; position: absolute; left: 8px; top: 6px; bottom: 6px;
    width: 2px; background: var(--timeline-line); border-radius: 1px;
  }
  .tl-item { position: relative; padding-bottom: 18px; }
  .tl-item:last-child { padding-bottom: 0; }
  .tl-dot {
    position: absolute; left: -22px; top: 5px;
    width: 11px; height: 11px; border-radius: 50%;
    background: var(--brand); border: 2px solid var(--panel); z-index: 1;
    box-shadow: 0 0 0 2px var(--brand-soft);
  }
  .tl-time {
    font-size: .75rem; color: var(--muted); white-space: nowrap;
    margin-bottom: 2px;
  }
  .tl-msg {
    font-size: .84rem; line-height: 1.45; word-break: break-all;
  }
  .tl-msg a { color: var(--brand); }
  .tl-hash {
    font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
    font-size: .72rem; color: var(--muted); margin-top: 2px;
  }
  .tl-loading { text-align: center; color: var(--muted); padding: 30px 0; font-size: .88rem; }
  .tl-error { text-align: center; color: var(--muted); padding: 20px 0; font-size: .85rem; }

  /* 右侧主区域 */
  .main-area { flex: 1; min-width: 0; }
  .toolbar {
    display: flex; gap: 10px; flex-wrap: wrap; align-items: center;
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 14px; padding: 12px 14px; box-shadow: var(--shadow);
    position: sticky; top: 12px; z-index: 20;
  }
  .search {
    flex: 1 1 200px; display: flex; align-items: center; gap: 8px;
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 10px; padding: 7px 11px;
  }
  .search input {
    flex: 1; border: none; outline: none; background: transparent;
    color: var(--text); font-size: .92rem;
  }
  .btn {
    border: 1px solid var(--border); background: var(--panel); color: var(--text);
    padding: 7px 12px; border-radius: 10px; cursor: pointer; font-size: .86rem;
    display: inline-flex; align-items: center; gap: 5px; transition: .15s;
  }
  .btn:hover { border-color: var(--brand); color: var(--brand); }
  .count-tip { color: var(--muted); font-size: .83rem; margin-left: auto; }

  .content {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 14px; padding: 28px 32px; margin-top: 14px;
    box-shadow: var(--shadow); overflow-wrap: break-word;
  }

  /* Markdown 渲染样式 */
  .content h1 { font-size: 1.75rem; border-bottom: 2px solid var(--border); padding-bottom: .3em; margin-top: 0; }
  .content h2 { font-size: 1.42rem; border-bottom: 1px solid var(--border); padding-bottom: .3em; margin-top: 2em; }
  .content h3 { font-size: 1.2rem; margin-top: 1.6em; }
  .content h4 { font-size: 1.02rem; margin-top: 1.4em; color: var(--brand); }
  .content table {
    border-collapse: collapse; width: 100%; margin: 14px 0; font-size: .90rem;
    display: block; overflow-x: auto;
  }
  .content th, .content td { border: 1px solid var(--border); padding: 7px 11px; text-align: left; }
  .content th { background: var(--brand-soft); font-weight: 600; white-space: nowrap; }
  .content tr:nth-child(2n) td { background: var(--bg); }
  .content code {
    background: var(--code-bg); border: 1px solid var(--border);
    padding: .15em .4em; border-radius: 6px; font-size: .86em;
    font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
  }
  .content pre {
    background: var(--code-bg); border: 1px solid var(--border);
    padding: 16px; border-radius: 10px; overflow-x: auto;
  }
  .content pre code { border: none; padding: 0; background: none; }
  .content blockquote {
    border-left: 4px solid var(--brand); margin: 14px 0; padding: 4px 16px;
    color: var(--muted); background: var(--brand-soft); border-radius: 0 8px 8px 0;
  }
  .content hr { border: none; border-top: 1px solid var(--border); margin: 2em 0; }
  .content ul, .content ol { padding-left: 1.5em; }
  tr.row-hidden { display: none; }

  .loading { text-align: center; color: var(--muted); padding: 50px 0; }
  footer { text-align: center; color: var(--muted); font-size: .83rem; padding: 20px 16px 36px; }

  /* 移动端响应式 */
  @media (max-width: 900px) {
    .wrap { flex-direction: column; }
    .sidebar { width: 100%; position: static; }
    .sidebar-panel { max-height: 320px; }
    .sidebar-body { max-height: 260px; }
  }
  @media (max-width: 640px) {
    .hero h1 { font-size: 1.7rem; }
    .hero { padding: 36px 14px 44px; }
    .content { padding: 18px 15px; }
    .wrap { padding: 0 12px; }
  }
</style>
</head>
<body>
  <header class="hero">
    <h1>🎯 夸夸签</h1>
    <p>自动签到脚本合集 · 130+ 脚本，适用于青龙面板等自动化工具</p>
    <div class="badges">
      <span class="badge">📦 JavaScript / Python</span>
      <span class="badge">🔔 20+ 通知渠道</span>
      <span class="badge">🐉 青龙面板订阅</span>
    </div>
  </header>

  <div class="wrap">
    <!-- 左侧：提交时间轴 -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-panel">
        <div class="sidebar-header">📋 更新记录</div>
        <div class="sidebar-body">
          <div class="timeline" id="timeline">
            <div class="tl-loading">加载中…</div>
          </div>
        </div>
      </div>
    </aside>

    <!-- 右侧：README 内容 -->
    <main class="main-area">
      <div class="toolbar">
        <label class="search">
          🔍
          <input id="searchInput" type="text" placeholder="搜索脚本名称 / 文件名 / 环境变量…" />
        </label>
        <a class="btn" href="https://github.com/ZHwin/kuakuaql-docs" target="_blank" rel="noopener">⭐ GitHub</a>
        <button class="btn" id="themeBtn" type="button">🌙 深色</button>
        <span class="count-tip" id="countTip"></span>
      </div>

      <article class="content" id="content">
        <div class="loading">正在加载 README…</div>
      </article>
    </main>
  </div>

  <footer>
    由 README.md 自动渲染 · 通过 GitHub Pages 托管
  </footer>

<script>
  // ====== 主题切换 ======
  const themeBtn = document.getElementById('themeBtn');
  const savedTheme = localStorage.getItem('theme');
  if (savedTheme === 'dark' || (!savedTheme && matchMedia('(prefers-color-scheme: dark)').matches)) {
    document.documentElement.setAttribute('data-theme', 'dark');
    themeBtn.textContent = '☀️ 浅色';
  }
  themeBtn.addEventListener('click', () => {
    const dark = document.documentElement.getAttribute('data-theme') === 'dark';
    if (dark) {
      document.documentElement.removeAttribute('data-theme');
      themeBtn.textContent = '🌙 深色';
      localStorage.setItem('theme', 'light');
    } else {
      document.documentElement.setAttribute('data-theme', 'dark');
      themeBtn.textContent = '☀️ 浅色';
      localStorage.setItem('theme', 'dark');
    }
  });

  // ====== 加载 Git 提交时间轴（拉取主仓库的提交记录）======
  const REPO = 'ZHwin/kuakuaql';
  const API = 'https://api.github.com/repos/' + REPO + '/commits?per_page=25';
  const tlEl = document.getElementById('timeline');

  function timeAgo(dateStr) {
    const now = Date.now();
    const d = new Date(dateStr);
    const diff = now - d.getTime();
    const mins = Math.floor(diff / 60000);
    if (mins < 1) return '刚刚';
    if (mins < 60) return mins + ' 分钟前';
    const hrs = Math.floor(mins / 60);
    if (hrs < 24) return hrs + ' 小时前';
    const days = Math.floor(hrs / 24);
    if (days < 30) return days + ' 天前';
    return d.toLocaleDateString('zh-CN', { month:'short', day:'numeric' });
  }

  function shortHash(h) { return h.slice(0, 7); }

  fetch(API)
    .then(r => r.json())
    .then(commits => {
      if (!commits.length) {
        tlEl.innerHTML = '<div class="tl-error">暂无记录</div>';
        return;
      }
      let html = '';
      commits.forEach(c => {
        const msg = c.commit.message.split('\n')[0];
        const date = c.commit.author.date;
        const hash = c.sha;
        const author = c.commit.author.name;
        html += '<div class="tl-item">' +
          '<div class="tl-dot"></div>' +
          '<div class="tl-time">' + timeAgo(date) + '</div>' +
          '<div class="tl-msg">' +
            '<a href="' + c.html_url + '" target="_blank" rel="noopener">' + escapeHtml(msg) + '</a>' +
          '</div>' +
          '<div class="tl-hash">' + shortHash(hash) + ' · ' + escapeHtml(author) + '</div>' +
        '</div>';
      });
      tlEl.innerHTML = html;
    })
    .catch(() => {
      tlEl.innerHTML = '<div class="tl-error">加载失败</div>';
    });

  function escapeHtml(s) {
    const d = document.createElement('div'); d.textContent = s; return d.innerHTML;
  }

  // ====== 加载并渲染 README.md ======
  const contentEl = document.getElementById('content');
  fetch('README.md?_=' + Date.now())
    .then(r => { if (!r.ok) throw new Error(r.status); return r.text(); })
    .then(md => {
      contentEl.innerHTML = marked.parse(md);
      initSearch();
    })
    .catch(err => {
      contentEl.innerHTML =
        '<div class="loading">README.md 加载失败（' + err.message +
        '）。请确认已通过 GitHub Pages 或本地服务器访问本页面。</div>';
    });

  // ====== 表格行搜索过滤 ======
  function initSearch() {
    const input = document.getElementById('searchInput');
    const countTip = document.getElementById('countTip');
    const rows = Array.from(contentEl.querySelectorAll('table tbody tr'));
    const total = rows.length;
    countTip.textContent = '共 ' + total + ' 条';

    input.addEventListener('input', () => {
      const kw = input.value.trim().toLowerCase();
      let shown = 0;
      rows.forEach(tr => {
        const hit = !kw || tr.textContent.toLowerCase().includes(kw);
        tr.classList.toggle('row-hidden', !hit);
        if (hit) shown++;
      });
      countTip.textContent = kw ? ('匹配 ' + shown + ' / ' + total + ' 条') : ('共 ' + total + ' 条');
    });
  }
</script>
</body>
</html>
